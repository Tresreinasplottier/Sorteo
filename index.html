<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa de Pascuas - Viaje de Egresados</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #fff5f8; color: #444; padding: 15px; }
        .container { background: white; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #d81b60; font-size: 26px; margin-bottom: 5px; }
        .subtitulo { color: #ad1457; font-weight: bold; margin-bottom: 20px; display: block; }
        
        /* Recuadro de Premios */
        .info-box { background: #fce4ec; border: 2px solid #f8bbd0; border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .info-box h2 { color: #d81b60; font-size: 20px; margin-top: 0; text-align: center; border-bottom: 1px solid #f8bbd0; padding-bottom: 5px; }
        .pago-info { background: #fff; border-radius: 10px; padding: 10px; margin-top: 10px; border: 1px solid #f8bbd0; text-align: center; }
        
        /* Grilla de Números */
        .grilla { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; margin: 20px 0; }
        .nro { padding: 12px 5px; background: #fce4ec; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; border: 1px solid #f8bbd0; }
        .nro:hover { background: #f8bbd0; transform: scale(1.1); }
        .nro.reservado { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; text-decoration: line-through; border: none; }
        .nro.seleccionado { background: #d81b60; color: white; border-color: #ad1457; box-shadow: 0 0 10px rgba(216, 27, 96, 0.3); }
        
        /* Menú de Reserva */
        #form-reserva { display: none; margin-top: 25px; padding: 20px; background: #fff0f6; border-radius: 15px; border: 2px dashed #ff80ab; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { padding: 12px; width: 90%; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ff80ab; outline: none; font-size: 16px; }
        
        /* Botón WhatsApp */
        button { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        button:hover { background: #128c7e; transform: scale(1.02); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* Pie de página */
        .footer { margin-top: 30px; padding: 20px; border-top: 1px solid #eee; font-size: 14px; line-height: 1.6; }
        .fecha-sorteo { background: #d81b60; color: white; padding: 5px 10px; border-radius: 5px; display: inline-block; margin: 10px 0; font-weight: bold; }
    </style>
</head>
